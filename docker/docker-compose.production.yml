# Production deployment using published GHCR image.
# Copy to your server and configure .env with your secrets.
#
# Usage:
#   cp .env.example .env
#   # Edit .env with your values
#   docker compose -f docker/docker-compose.production.yml up -d
#
# v2 talks to actual-server directly via the @actual-app/api SDK; the
# actual-http-api sidecar from v1 is no longer required. See
# docs/MIGRATION-v1-to-v2.md for migrating from a v1 deployment.

services:
  actual-budget:
    image: actualbudget/actual-server:latest
    ports:
      - "5006:5006"
    volumes:
      - actual-data:/data
    restart: unless-stopped
    networks:
      - actual-network

  actual-mcp:
    image: ghcr.io/kazefreeze/actual-budget-mcp:latest
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - ACTUAL_SERVER_URL=http://actual-budget:5006
      - ACTUAL_SERVER_PASSWORD=${ACTUAL_SERVER_PASSWORD}
      - ACTUAL_BUDGET_SYNC_ID=${ACTUAL_BUDGET_SYNC_ID}
      - ACTUAL_BUDGET_ENCRYPTION_PASSWORD=${ACTUAL_BUDGET_ENCRYPTION_PASSWORD:-}
      - MCP_API_KEYS=${MCP_API_KEYS}
      - MCP_ALLOWED_ORIGINS=${MCP_ALLOWED_ORIGINS:-}
      - MCP_TRANSPORT=http
      - MCP_PORT=3000
      - LOG_LEVEL=info
    depends_on:
      - actual-budget
    volumes:
      - actual-mcp-cache:/var/lib/actual-mcp
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - actual-network

volumes:
  actual-data:
  actual-mcp-cache:

networks:
  actual-network:
    driver: bridge
